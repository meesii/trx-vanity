<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1a1a2e" />
            <stop offset="100%" stop-color="#0f0f1a" />
        </linearGradient>
        <linearGradient id="gem" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="50%" stop-color="#818cf8" />
            <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>
        <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#818cf8" stop-opacity="0.3" />
        </linearGradient>
    </defs>
    <!-- 圆角背景 -->
    <rect width="512" height="512" rx="108" fill="url(#bg)" />
    <!-- 钻石主体 -->
    <g transform="translate(256,248) scale(1.2)">
        <!-- 下半：三角 -->
        <polygon points="0,155 -130,-15 130,-15" fill="url(#gem)" opacity="0.85" />
        <!-- 上半：梯形 -->
        <polygon points="-130,-15 130,-15 95,-95 -95,-95" fill="url(#gem)" />
        <!-- 顶面高光 -->
        <polygon points="-95,-95 95,-95 130,-15 0,-15" fill="url(#shine)" opacity="0.45" />
        <!-- 左面暗部 -->
        <polygon points="-130,-15 0,-15 0,155" fill="#4338ca" opacity="0.35" />
        <!-- 中线切面 -->
        <line x1="-130" y1="-15" x2="130" y2="-15" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5" />
        <line x1="0" y1="-15" x2="0" y2="155" stroke="#a5b4fc" stroke-width="1" opacity="0.3" />
        <line x1="0" y1="-15" x2="-95" y2="-95" stroke="#a5b4fc" stroke-width="1" opacity="0.3" />
        <line x1="0" y1="-15" x2="95" y2="-95" stroke="#a5b4fc" stroke-width="1" opacity="0.3" />
        <!-- 顶部小闪光 -->
        <circle cx="-30" cy="-75" r="6" fill="white" opacity="0.7" />
        <circle cx="-30" cy="-75" r="12" fill="white" opacity="0.15" />
    </g>
</svg>